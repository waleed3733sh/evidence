<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>لوحة التحكم | ملف الشواهد</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="dashboard">
  <div class="app-shell">
    <aside class="sidebar no-print">
      <div class="brand">
        <span class="brand-mark"></span>
        <strong>ملف الشواهد</strong>
        <span>الأداء الوظيفي</span>
      </div>
      <section class="profile-card">
        <strong id="teacherName">...</strong>
        <span id="teacherMeta">...</span>
        <small id="teacherEmail">...</small>
        <div class="mini-progress">
          <span id="miniProgressText">0%</span>
          <div><i id="miniProgressBar" style="width:0%"></i></div>
        </div>
      </section>
      <nav id="mainNav" class="main-nav" aria-label="التنقل الرئيسي"></nav>
    </aside>
    <main class="content">
      <header class="topbar no-print">
        <div>
          <p class="eyebrow">لوحة المستخدم</p>
          <h1>لوحة التحكم</h1>
        </div>
        <div class="topbar-actions">
          <button id="savePage" class="primary" type="button">حفظ</button>
          <button id="logout" class="secondary" type="button">خروج</button>
        </div>
      </header>
      <div id="pageRoot"></div>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script src="assets/app.js"></script>
</body>
</html>
